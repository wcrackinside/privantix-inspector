project_name: privantix-inspector

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: privantix-inspector
    main: ./cmd/inspector
    binary: privantix-inspector
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    builds:
      - privantix-inspector
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc

release:
  github:
    owner: privantix
    name: source-inspector
