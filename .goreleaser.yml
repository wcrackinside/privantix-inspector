# Builds CLI tools and publishes one ZIP/tar per OS+arch with docs and examples.
# Trigger: push tag v* (see .github/workflows/release.yml)
# Requires: GITHUB_TOKEN with contents:write (default in Actions)

project_name: privantix-inspector

before:
  hooks:
    - go mod tidy

builds:
  - id: privantix-inspector
    main: ./cmd/privantix-inspector
    binary: privantix-inspector
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: privantix-acl-audit
    main: ./cmd/privantix-acl-audit
    binary: privantix-acl-audit
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: privantix-catalog
    main: ./cmd/privantix-catalog
    binary: privantix-catalog
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: privantix-compare
    main: ./cmd/privantix-compare
    binary: privantix-compare
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    builds:
      - privantix-inspector
      - privantix-acl-audit
      - privantix-catalog
      - privantix-compare
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - config.yaml
      - src: "docs/**"
        dst: docs
      - src: "examples/**"
        dst: examples
      - src: "content/products/**"
        dst: content/products

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc

release:
  github:
    owner: wcrackinside
    name: privantix-inspector
