name: Validate products.json

on:
  push:
    paths:
      - "privantix_site/products.json"
  pull_request:
    paths:
      - "privantix_site/products.json"

jobs:
  json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON
        run: python3 -c "import json; json.load(open('privantix_site/products.json'))"
